name: Sync card catalog

on:
  schedule:
    - cron: "0 21 * * 5" # 每週六 05:00（台北時間）
  workflow_dispatch: # 也可以在 Actions 頁手動觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      # 每個來源各自一個 job、各自 60 分鐘額度，避免跑得慢的來源（例如全量的
      # ptcg-en）把後面的日文卡表擠到超時、完全沒機會執行
      matrix:
        source: [ptcg-en, ptcg-ja, ptcg-zh-tw, opcg-en, opcg-ja]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r crawler/requirements.txt

      - name: Sync ${{ matrix.source }}
        working-directory: crawler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PTCG_API_KEY: ${{ secrets.PTCG_API_KEY }}
        run: python sync.py ${{ matrix.source }}
